name: tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: sermon-archive-wiki doctor --config examples/sermon-archive-wiki.example.yml --strict
      - run: pytest
      - run: sermon-archive-wiki ingest --config examples/sermon-archive-wiki.example.yml --no-summary-pass --content-pass
